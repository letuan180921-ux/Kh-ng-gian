<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Xem Video 360 Độ</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        /* Giao diện nút bấm tùy chỉnh */
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 1px solid white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div id="controls">
        <button id="playBtn">Phát Video</button>
        <button id="permissionBtn" style="display: none;">Bật Cảm Biến (iOS)</button>
    </div>

    <a-scene loading-screen="enabled: false">
        
        <a-assets>
            <video id="video360" 
                   src="https://bitmovin-a.akamaihd.net/content/playhouse-vr/progressive.mp4" 
                   preload="auto" 
                   loop="true" 
                   playsinline 
                   webkit-playsinline 
                   crossorigin="anonymous">
            </video>
        </a-assets>

        <a-videosphere src="#video360" rotation="0 -90 0"></a-videosphere>

        <a-entity camera look-controls></a-entity>

    </a-scene>

    <script>
        const video = document.getElementById('video360');
        const playBtn = document.getElementById('playBtn');
        const permissionBtn = document.getElementById('permissionBtn');

        // Xử lý nút Play/Pause
        playBtn.addEventListener('click', () => {
            if (video.paused) {
                video.play();
                playBtn.innerText = "Tạm Dừng";
            } else {
                video.pause();
                playBtn.innerText = "Phát Video";
            }
        });

        // Xử lý cấp quyền cảm biến riêng cho thiết bị iOS (iPhone/iPad)
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            // Hiện nút xin quyền nếu là iOS
            permissionBtn.style.display = "block";
            
            permissionBtn.addEventListener('click', () => {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            permissionBtn.style.display = 'none'; // Ẩn nút sau khi đã cấp quyền
                            window.location.reload(); // Tải lại để A-Frame nhận cảm biến
                        } else {
                            alert('Bạn cần cấp quyền cảm biến để xoay được video!');
                        }
                    })
                    .catch(console.error);
            });
        }
    </script>
</body>
</html>
