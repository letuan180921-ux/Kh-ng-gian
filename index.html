<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Xem Video 360 Độ</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: 1px solid #fff;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="controls">
        <button id="playBtn">Phát Video</button>
        <button id="permissionBtn" style="display: none;">Bật Cảm Biến (iOS)</button>
    </div>

    <a-scene loading-screen="enabled: false">
        <a-assets>
            <video id="video360" 
                   src="video.mp4" 
                   preload="auto" 
                   loop="true" 
                   playsinline 
                   webkit-playsinline 
                   crossorigin="anonymous">
            </video>
        </a-assets>

        <a-videosphere src="#video360" rotation="0 -90 0"></a-videosphere>

        <a-entity camera look-controls></a-entity>
    </a-scene>

    <script>
        const video = document.getElementById('video360');
        const playBtn = document.getElementById('playBtn');
        const permissionBtn = document.getElementById('permissionBtn');

        // Trình duyệt chặn tự động phát video có tiếng, nên cần người dùng bấm nút này để kích hoạt
        playBtn.addEventListener('click', () => {
            if (video.paused) {
                video.play();
                playBtn.innerText = "Tạm Dừng";
            } else {
                video.pause();
                playBtn.innerText = "Phát Video";
            }
        });

        // Xin quyền truy cập cảm biến chuyển động riêng cho iPhone (iOS)
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            permissionBtn.style.display = "block";
            permissionBtn.addEventListener('click', () => {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            permissionBtn.style.display = 'none';
                            window.location.reload(); 
                        } else {
                            alert('Vui lòng cấp quyền cảm biến để xoay được góc nhìn!');
                        }
                    })
                    .catch(console.error);
            });
        }
    </script>
</body>
</html>
